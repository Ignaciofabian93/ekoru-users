name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:gen

      - name: Check formatting
        run: npx prettier --check "src/**/*.ts"

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage

      - name: Build
        run: npm run build

      - name: Security audit
        # Remaining known vulns are in dev-only tooling (@nestjs/cli, @prisma/dev)
        # and are not shipped in the production Docker image. Fixes require
        # breaking downgrades incompatible with Node 22.
        run: npm audit --audit-level=critical
